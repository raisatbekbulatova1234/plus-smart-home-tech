server:
  port: 0

spring:
  application:
    name: payment

  datasource:
    url: jdbc:postgresql://localhost:5437/payment
    username: main
    password: main
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.format_sql: true
      jdbc.time_zone: UTC

  sql:
    init:
      mode: always

  logging:
    level:
      root: INFO
      org.springframework: INFO
      org.hibernate.SQL: DEBUG

  resilience4j:
    circuitbreaker:
      instances:
        shoppingStorePayment:
          sliding-window-size: 10
          minimum-number-of-calls: 5
          failure-rate-threshold: 50
          wait-duration-in-open-state: 10s
          permitted-number-of-calls-in-half-open-state: 3
          ignore-exceptions:
            - ru.yandex.practicum.exceptions.store.ProductNotFoundException
            - ru.yandex.practicum.exceptions.client.ServiceValidationException
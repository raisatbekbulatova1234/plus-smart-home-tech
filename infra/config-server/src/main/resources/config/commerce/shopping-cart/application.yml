server:
  port: 0

spring:
  application:
    name: shopping-cart

  datasource:
    url: jdbc:postgresql://localhost:5434/shopping_cart
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.format_sql: true
      jdbc.time_zone: UTC

  sql:
    init:
      mode: always

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      warehouse:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - ru.yandex.practicum.exceptions.warehouse.NoSpecifiedProductInWarehouseException
          - ru.yandex.practicum.exceptions.warehouse.ProductInShoppingCartLowQuantityInWarehouse
aggregator:
  kafka:
    producer:
      properties:
        bootstrap.servers: localhost:9092
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
        value.serializer: ru.yandex.practicum.kafka.serialization.GeneralAvroSerializer
      snapshot-topic: telemetry.snapshots.v1

    consumer:
      properties:
        bootstrap.servers: localhost:9092
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: ru.yandex.practicum.kafka.deserialization.SensorEventDeserializer
        group.id: telemetry.aggregator.sensors
      sensor-topic: telemetry.sensors.v1
      poll-timeout: 100ms
      batch-size: 10
services:
  kafka:
    image: confluentinc/confluent-local:7.4.3
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092" # for client connections
      - "9101:9101" # JMX
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      CLUSTER_ID: 'K0EA9p0yEe6MkAAAAkKsEg'

  kafka-init-topics:
    image: confluentinc/confluent-local:7.4.3
    container_name: kafka-init-topics
    depends_on:
      - kafka
    command: "bash -c \
                'kafka-topics --create --topic telemetry.sensors.v1 \
                             --partitions 1 --replication-factor 1 --if-not-exists \
                             --bootstrap-server kafka:29092 && \
                kafka-topics --create --topic telemetry.snapshots.v1 \
                             --partitions 1 --replication-factor 1 --if-not-exists \
                             --bootstrap-server kafka:29092 && \
                kafka-topics --create --topic telemetry.hubs.v1 \
                             --partitions 1 --replication-factor 1 --if-not-exists \
                             --bootstrap-server kafka:29092'"
    init: true

  postgres-analyzer:
    image: postgres:16.1
    container_name: postgres_analyzer
    environment:
      POSTGRES_DB: analyzer
      POSTGRES_USER: main
      POSTGRES_PASSWORD: main
    ports:
      - "5432:5432"

  shopping-store-db:
    image: postgres:16.1
    container_name: shopping_store_db
    environment:
      POSTGRES_DB: shopping_store
      POSTGRES_USER: main
      POSTGRES_PASSWORD: main
    ports:
      - "5433:5432"

  shopping-cart-db:
    image: postgres:16.1
    container_name: shopping_cart_db
    environment:
      POSTGRES_DB: shopping_cart
      POSTGRES_USER: main
      POSTGRES_PASSWORD: main
    ports:
      - "5434:5432"

  warehouse-db:
    image: postgres:16.1
    container_name: warehouse_db
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: main
      POSTGRES_PASSWORD: main
    ports:
      - "5435:5432"

  order-db:
    image: postgres:16.1
    container_name: order_db
    environment:
      POSTGRES_DB: order
      POSTGRES_USER: main
      POSTGRES_PASSWORD: main
    ports:
      - "5436:5432"

  payment-db:
    image: postgres:16.1
    container_name: payment_db
    environment:
      POSTGRES_DB: payment
      POSTGRES_USER: main
      POSTGRES_PASSWORD: main
    ports:
      - "5437:5432"

  delivery-db:
    image: postgres:16.1
    container_name: delivery_db
    environment:
      POSTGRES_DB: delivery
      POSTGRES_USER: main
      POSTGRES_PASSWORD: main
    ports:
      - "5438:5432"